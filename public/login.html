<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar | Painel de Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-body-tertiary">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="row justify-content-center w-100">
      <div class="col-sm-10 col-md-8 col-lg-5 col-xl-4">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle p-3 mb-3">
                <i class="bi bi-people-fill fs-3"></i>
              </div>
              <h1 class="h3 mb-1">Painel de Clientes</h1>
              <p class="text-body-secondary mb-0">Entre para acessar o sistema.</p>
            </div>
            <div id="mensagem-login" class="alert alert-danger" role="alert" hidden></div>
            <form id="form-login" novalidate>
              <div class="mb-3">
                <label class="form-label" for="input-usuario">Usuário ou Gmail</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-person"></i></span>
                  <input id="input-usuario" class="form-control" type="text" autocomplete="username" required autofocus>
                </div>
                <div class="invalid-feedback">Informe seu usuário ou Gmail.</div>
              </div>
              <div class="mb-4">
                <label class="form-label" for="input-senha">Senha</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input id="input-senha" class="form-control" type="password" autocomplete="current-password" required>
                  <button id="btn-mostrar-senha" class="btn btn-outline-secondary" type="button" aria-label="Mostrar senha"><i class="bi bi-eye"></i></button>
                </div>
                <div class="invalid-feedback">Informe sua senha.</div>
              </div>
              <button id="btn-entrar" class="btn btn-dark w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Entrar</button>
            </form>
            <a class="btn btn-outline-secondary w-100 mt-3" href="/cadastro"><i class="bi bi-person-plus me-2"></i>Ainda não tem uma conta? Clique para se cadastrar</a>
          </div>
        </div>
        <p class="text-center text-body-secondary small mt-3 mb-0">Acesso restrito a usuários autorizados.</p>
      </div>
    </div>
  </main>
  <script src="login.js"></script>
</body>
</html>
