<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar conta | Painel de Clientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-body-tertiary">
  <main class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
    <div class="row justify-content-center w-100">
      <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle p-3 mb-3"><i class="bi bi-person-plus-fill fs-3"></i></div>
              <h1 class="h3 mb-1">Criar uma conta</h1>
              <p class="text-body-secondary mb-0">Preencha os dados para acessar o painel.</p>
            </div>
            <div id="mensagem-cadastro" class="alert alert-danger" role="alert" hidden></div>
            <form id="form-cadastro" novalidate>
              <div class="mb-3">
                <label class="form-label" for="input-novo-usuario">Nome de usuário</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span><input id="input-novo-usuario" class="form-control" type="text" autocomplete="username" required></div>
                <div class="form-text">Use de 3 a 30 caracteres: letras, números, ponto, hífen ou sublinhado.</div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="input-email-cadastro">Gmail</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-envelope"></i></span><input id="input-email-cadastro" class="form-control" type="email" autocomplete="email" placeholder="nome@gmail.com" required></div>
                <div class="invalid-feedback">Informe um Gmail válido.</div>
              </div>
              <div class="mb-4">
                <label class="form-label" for="input-nova-senha">Senha</label>
                <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span><input id="input-nova-senha" class="form-control" type="password" autocomplete="new-password" minlength="6" required><button id="btn-mostrar-nova-senha" class="btn btn-outline-secondary" type="button" aria-label="Mostrar senha"><i class="bi bi-eye"></i></button></div>
                <div class="form-text">A senha deve ter pelo menos 6 caracteres.</div>
              </div>
              <button id="btn-criar-conta" class="btn btn-dark w-100" type="submit"><i class="bi bi-person-check me-2"></i>Criar conta</button>
            </form>
            <a class="btn btn-outline-secondary w-100 mt-3" href="/"><i class="bi bi-arrow-left me-2"></i>Voltar para o login</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="cadastro.js"></script>
</body>
</html>
