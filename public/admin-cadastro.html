<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Novo superusuário</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"></head>
<body class="bg-dark"><main class="container min-vh-100 d-flex align-items-center justify-content-center py-4"><div class="row justify-content-center w-100"><div class="col-sm-10 col-md-8 col-lg-6 col-xl-5"><div class="card border-secondary shadow-lg bg-body-tertiary"><div class="card-body p-4 p-md-5">
<div class="text-center mb-4"><div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle p-3 mb-3"><i class="bi bi-person-gear fs-3"></i></div><h1 class="h3 mb-1">Criar superusuário</h1><p class="text-body-secondary mb-0">Use dados exclusivos da administração.</p></div>
<div id="mensagem-cadastro" class="alert alert-danger" hidden></div><form id="form-cadastro" novalidate>
<div class="mb-3"><label class="form-label" for="usuario">Nome de usuário</label><input id="usuario" class="form-control" autocomplete="username" required></div>
<div class="mb-3"><label class="form-label" for="email">Gmail</label><input id="email" class="form-control" type="email" placeholder="nome@gmail.com" autocomplete="email" required></div>
<div class="mb-3"><label class="form-label" for="telefone">Telefone com DDD</label><input id="telefone" class="form-control" inputmode="tel" placeholder="(92) 99999-9999" autocomplete="tel" required></div>
<div class="mb-4"><label class="form-label" for="senha">Senha</label><div class="input-group"><input id="senha" class="form-control" type="password" autocomplete="new-password" minlength="6" required><button id="btn-mostrar-senha" class="btn btn-outline-secondary" type="button" aria-label="Mostrar senha"><i class="bi bi-eye"></i></button></div></div>
<button id="btn-criar" class="btn btn-dark w-100" type="submit"><i class="bi bi-shield-check me-2"></i>Criar superusuário</button></form>
<a class="btn btn-outline-secondary w-100 mt-3" href="/admin"><i class="bi bi-arrow-left me-2"></i>Voltar para o login administrativo</a>
</div></div></div></div></main><script src="/admin-cadastro.js"></script></body></html>
